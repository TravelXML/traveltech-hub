  <body>
    <div id="root"></div>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages: https://github.com/rafgraph/spa-github-pages
      // Decodes a redirect encoded by public/404.html back into a real URL
      // via history.replaceState, before React Router mounts and reads the
      // URL. No-op on Cloudflare Pages, which never hits 404.html.
      ;(function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
